<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Window and Door Production Floor Bottleneck Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    #titlebar {
      background: #111;
      border-bottom: 1px solid #00ff41;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #titlebar .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #555;
    }

    #titlebar .title {
      color: #00ff41;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: 8px;
    }

    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #terminal::-webkit-scrollbar { width: 6px; }
    #terminal::-webkit-scrollbar-track { background: #0d0d0d; }
    #terminal::-webkit-scrollbar-thumb { background: #1a4a1a; border-radius: 3px; }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .line.input-echo {
      color: #00ff41;
    }

    .line.output {
      color: #b0ffb0;
    }

    .line.error {
      color: #ff4444;
    }

    .line.system {
      color: #555;
      font-style: italic;
    }

    .line.op-header {
      color: #00ff41;
      font-weight: bold;
    }

    #input-row {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      border-top: 1px solid #1a3a1a;
      background: #0a0a0a;
      flex-shrink: 0;
      gap: 8px;
    }

    #prompt {
      color: #00ff41;
      white-space: nowrap;
      user-select: none;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      caret-color: #00ff41;
    }

    #input::placeholder {
      color: #1a4a1a;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .separator {
      color: #1a4a1a;
    }
  </style>
</head>
<body>

<div id="titlebar">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <span class="title">Window and Door Production Floor &mdash; Production Bottleneck Terminal</span>
</div>

<div id="terminal">
  <div class="line system">Window and Door Production Floor Operations Terminal v1.0</div>
  <div class="line system">Type "help" or "list" to see all operations. Type "clear" to reset.</div>
  <div class="line separator">──────────────────────────────────────────────────────</div>
  <div class="line">&nbsp;</div>
</div>

<div id="input-row">
  <span id="prompt">Window and Door Production Floor&gt;&nbsp;</span>
  <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="Enter operation name or number..." />
</div>

<script>
  const terminal = document.getElementById('terminal');
  const input = document.getElementById('input');

  function appendLine(text, cls = 'output') {
    const lines = text.split('\n');
    lines.forEach(line => {
      const div = document.createElement('div');
      div.className = `line ${cls}`;
      div.textContent = line === '' ? ' ' : line;
      terminal.appendChild(div);
    });
    terminal.scrollTop = terminal.scrollHeight;
  }

  function appendSeparator() {
    const div = document.createElement('div');
    div.className = 'line separator';
    div.textContent = '──────────────────────────────────────────────────────';
    terminal.appendChild(div);
  }

  async function sendQuery(message) {
    appendLine(`Window and Door Production Floor> ${message}`, 'input-echo');

    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    if (data.response === '__CLEAR__') {
      terminal.innerHTML = '';
      appendLine('Terminal cleared.', 'system');
      return;
    }

    // Style op header line differently
    const lines = data.response.split('\n');
    lines.forEach((line, i) => {
      if (i === 0 && line.startsWith('Operation #')) {
        appendLine(line, 'op-header');
      } else if (line.trim().startsWith('•')) {
        appendLine(line, 'output');
      } else if (line.startsWith('  ') && !line.trim().startsWith('•')) {
        appendLine(line, 'output');
      } else {
        appendLine(line, data.response.includes('not recognized') ? 'error' : 'output');
      }
    });

    appendSeparator();
  }

  input.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      input.value = '';
      if (!val) return;
      await sendQuery(val);
    }
  });
</script>

</body>
</html>
